<!DOCTYPE html>
<html>
<head>
<title>Color Palettes</title>
<link rel="icon" href="res/favicon.ico">
<script src="palette.js"></script>
<script>
let domFile = null;
let domCount = null;
let domCountLabel = null;
let domPalettes = null;
let lastAction = null;

function onLoad() {
  domFile = document.getElementById("file");
  domCount = document.getElementById("count");
  domCountLabel = document.getElementById("count_label");
  domPalettes = document.getElementById("palettes");

  onCountChange();
  generate();
}
window.addEventListener("load", onLoad);

function onCountChange() {
  domCountLabel.innerText = domCount.value;
  if (lastAction) lastAction();
}

function clearPalettes() {
  domPalettes.innerHTML = '';
}

function generate() {
  lastAction = () => {
    clearPalettes();
    onGenerate(parseInt(domCount.value));
  };
  lastAction();
}

function toHex(c) {
  const hex = Math.max(0, Math.min(255, Math.round(c * 255))).toString(16);
  return hex.length == 1 ? "0" + hex : hex;
}

function rgbToHex(rgb) {
  return "#" + toHex(rgb[0]) + toHex(rgb[1]) + toHex(rgb[2]);
}

/**
 * Adds a palette row to the UI.
 * @param {Array<Array<number>>} colors Array of [r, g, b] triples (0-1).
 */
function addPalette(colors) {
  const row = document.createElement('div');
  row.className = 'palette_row';
  for (const color of colors) {
    const block = document.createElement('div');
    block.className = 'color_block';
    const hex = rgbToHex(color).toUpperCase();
    block.style.backgroundColor = hex;
    block.title = hex;
    row.appendChild(block);
  }
  domPalettes.appendChild(row);
}

function setInputFile(files) {
  for (const file of files) {
    if (file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        processImage(img);
        URL.revokeObjectURL(url);
      };
      img.src = url;
      break;
    }
  }
}

function processImage(img) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  // Downsample if there's too many pixels.
  const maxPixels = 1e5;
  const currentPixels = img.width * img.height;
  let scale = 1.0;
  if (currentPixels > maxPixels) {
    scale = Math.sqrt(maxPixels / currentPixels);
  }

  const width = Math.floor(img.width * scale);
  const height = Math.floor(img.height * scale);
  canvas.width = width;
  canvas.height = height;

  // Browser defaults to high-quality smoothing (bilinear/bicubic).
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, width, height);
  const data = ctx.getImageData(0, 0, width, height).data;

  const pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    pixels.push([data[i] / 255, data[i+1] / 255, data[i+2] / 255]);
  }

  lastAction = () => {
    clearPalettes();
    onImage(pixels, width, height, parseInt(domCount.value));
  };
  lastAction();
}

function onFileChange() { setInputFile(domFile.files); }
function onDragOver(e) { e.preventDefault(); }
function onDrop(e) {
  e.preventDefault();
  setInputFileFromDataTransfer(e.dataTransfer);
}
function onPaste(e) {
  e.preventDefault();
  setInputFileFromDataTransfer(e.clipboardData);
}
function setInputFileFromDataTransfer(dt) {
  let files = [];
  if (dt.items) {
    for (const item of dt.items) {
      if (item.kind == "file") files.push(item.getAsFile());
    }
  } else {
    files = dt.files;
  }
  setInputFile(files);
}
</script>
<style>
html {
  display: flex;
  flex-direction: column;
  min-height: 100%;
}
body {
  background-color: #212121;
  margin: 0;
  flex-grow: 1;
}
#head {
  background-color: #424242;
  width: 100%;
  display: flex;
  justify-content: space-around;
  margin-bottom: 16px;
}
h1, #index {
  color: #ffc107;
  text-align: center;
  font-family: monospace;
  font-size: 42px;
  flex-grow: 1;
  padding: 16px;
  margin: 0;
}
#index {
  color: #ff5722;
  text-decoration: none;
  flex-grow: 0;
}
a {
  color: #ff5722;
  font-family: monospace;
  font-size: 24px;
  cursor: pointer;
  text-decoration: underline;
}
#wrap {
  padding: 0 16px;
  color: #f5f5f5;
  font-family: monospace;
  font-size: 24px;
}
.controls {
  margin-bottom: 24px;
  text-align: center;
}
input[type="file"] {
  display: none;
}
input[type="range"] {
  vertical-align: middle;
}
.palette_row {
  display: flex;
  height: 64px;
  margin-bottom: 12px;
  border: 1px solid #424242;
}
.color_block {
  flex-grow: 1;
  height: 100%;
}
.color_block:hover {
  outline: 2px solid #f5f5f5;
  z-index: 1;
}
</style>
</head>
<body ondrop="onDrop(event)" ondragover="onDragOver(event)" onpaste="onPaste(event)">
  <div id="head">
    <a id="index" href="index.html">&lt;</a>
    <h1>Color Palettes</h1>
  </div>
  <div id="wrap">
    <div class="controls">
      <a onclick="generate()">Randomize</a>
      &nbsp;&nbsp;
      <label>
        <input type="file" id="file" accept="image/*" onchange="onFileChange()">
        <a>From Image</a>
      </label>
      &nbsp;&nbsp;
      Colors:
      <input type="range" id="count" min="2" max="10" value="5" oninput="onCountChange()">
      <span id="count_label">5</span>
    </div>
    <div id="palettes"></div>
  </div>
</body>
</html>
