let shuffledPrompts = [];
let currentIndex = 0;
let usingExtended = false;

function shuffle(array) {
  for (let i = 0; i < array.length; ++i) {
    const j = Math.floor(Math.random() * (array.length - i)) + i;
    const t = array[i];
    array[i] = array[j];
    array[j] = t;
  }
}

function nextPrompt() {
  const isExtended = document.getElementById('extended_check').checked;

  if (currentIndex >= shuffledPrompts.length || isExtended !== usingExtended) {
    usingExtended = isExtended;
    shuffledPrompts = [...PROMPTS];
    if (usingExtended) {
      shuffledPrompts = shuffledPrompts.concat(EXTENDED_PROMPTS);
    }
    shuffle(shuffledPrompts);
    currentIndex = 0;
  }
  
  const promptDisplay = document.getElementById('prompt-display');
  promptDisplay.innerText = shuffledPrompts[currentIndex++];
}

function onLoad() {
  document.getElementById('next_button').addEventListener('click', nextPrompt);
}

window.addEventListener('load', onLoad);
